<div class="modal-backdrop-custom d-flex align-items-center justify-content-center px-3 animate-fade-in">
  <div class="modal-container-premium shadow-app w-100 p-4 p-md-5 position-relative overflow-hidden" 
       style="max-width: 580px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 17, 26, 0.95); backdrop-filter: blur(20px); border-radius: 28px;">
    
    <div class="card-glow-top"></div>

    <div class="d-flex justify-content-between align-items-center mb-5 position-relative">
      <div class="d-flex align-items-center gap-3">
        <div class="p-3 rounded-4 bg-glass border border-white border-opacity-10 shadow-sm">
          <i class="bi bi-music-note-list text-primary-custom fs-3"></i>
        </div>
        <div>
          <h3 class="mb-0 text-white fw-bold tracking-tight">Register Asset</h3>
          <p class="text-muted small mb-0 uppercase tracking-widest spacing-1 opacity-75">Secure Intake Vault</p>
        </div>
      </div>
      <button class="btn-icon-glass-circle border-0 text-muted hover-white transition-all shadow-sm" (click)="close.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    @if (errorMessage()) {
      <div class="alert-glass p-3 rounded-3 border border-danger border-opacity-20 bg-danger bg-opacity-10 d-flex align-items-center gap-3 mb-4 animate-fade-in">
        <i class="bi bi-exclamation-octagon text-danger fs-5"></i>
        <span class="text-danger small fw-bold">{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" #sampleForm="ngForm" class="animate-slide-up">
      <div class="row g-4">
        <!-- Asset Title -->
        <div class="col-12">
          <div class="form-group-premium">
            <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Asset Identity</label>
            <div class="input-glass-container d-flex align-items-center px-3 rounded-3"
                 [class.border-danger]="title.invalid && title.touched"
                 style="border: 1px solid rgba(255,255,255,0.05)">
              <i class="bi bi-tag-fill me-2 opacity-50"></i>
              <input 
                type="text" 
                class="form-control" 
                name="title" 
                [(ngModel)]="sampleData.title"
                placeholder="e.g. Master Vocal Stem - Hook"
                required
                #title="ngModel"
              >
            </div>
            @if (title.invalid && title.touched) {
              <div class="text-danger smaller mt-1 italic ms-2">Authentication title required</div>
            }
          </div>
        </div>

        <!-- Recording Artist -->
        <div class="col-md-12">
          <div class="form-group-premium">
            <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Original Artist</label>
            <div class="input-glass-container d-flex align-items-center px-3 rounded-3"
                 style="border: 1px solid rgba(255,255,255,0.05)">
              <i class="bi bi-person-circle me-2 opacity-50"></i>
              <input 
                type="text" 
                class="form-control" 
                name="sourceArtist" 
                [(ngModel)]="sampleData.sourceArtist"
                placeholder="Recording Artist Name"
              >
            </div>
          </div>
        </div>

        <!-- Original Master -->
        <div class="col-md-6">
          <div class="form-group-premium">
            <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Source Master</label>
            <div class="input-glass-container d-flex align-items-center px-3 rounded-3"
                 style="border: 1px solid rgba(255,255,255,0.05)">
              <i class="bi bi-vinyl-fill me-2 opacity-50"></i>
              <input 
                type="text" 
                class="form-control" 
                name="sourceTrack" 
                [(ngModel)]="sampleData.sourceTrack"
                placeholder="Session / Album"
              >
            </div>
          </div>
        </div>

        <!-- Rights Clearance -->
        <div class="col-md-6">
          <div class="form-group-premium">
            <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Clearance Holder</label>
            <div class="input-glass-container d-flex align-items-center px-3 rounded-3"
                 style="border: 1px solid rgba(255,255,255,0.05)">
              <i class="bi bi-shield-lock-fill me-2 opacity-50"></i>
              <input 
                type="text" 
                class="form-control" 
                name="rightsHolder" 
                [(ngModel)]="sampleData.rightsHolder"
                placeholder="Legal Master Owner"
              >
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-3 justify-content-end mt-5 pt-4 border-top border-white border-opacity-05">
        <button 
          type="button" 
          class="btn btn-icon-glass px-4 py-2 rounded-pill text-muted fw-bold small uppercase" 
          (click)="close.emit()"
          [disabled]="isLoading()"
        >
          Cancel
        </button>
        <button 
          type="submit" 
          class="btn btn-primary-glow-action px-5 py-2 rounded-pill d-flex align-items-center gap-2"
          [disabled]="!sampleForm.form.valid || isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
            Syncing...
          } @else {
            <i class="bi bi-plus-lg"></i>
            Finalize Intake
          }
        </button>
      </div>
    </form>
  </div>
</div>
