<div class="modal-backdrop-custom d-flex align-items-center justify-content-center px-3 animate-fade-in">
  <div class="modal-container-premium shadow-app w-100 p-4 p-md-5 position-relative overflow-hidden" 
       style="max-width: 600px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 17, 26, 0.95); backdrop-filter: blur(20px); border-radius: 28px;">
    
    <div class="card-glow-top"></div>

    <div class="d-flex justify-content-between align-items-center mb-5 position-relative">
      <div class="d-flex align-items-center gap-3">
        <div class="p-3 rounded-4 bg-glass border border-white border-opacity-10 shadow-sm">
          <i class="bi bi-pencil-square text-primary-custom fs-3"></i>
        </div>
        <div>
          <h3 class="mb-0 text-white fw-bold tracking-tight">Modify Project</h3>
          <p class="text-muted small mb-0 uppercase tracking-widest spacing-1 opacity-75">Control Center Update</p>
        </div>
      </div>
      <button class="btn-icon-glass-circle border-0 text-muted hover-white transition-all shadow-sm" (click)="close.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    @if (isFetching()) {
      <div class="text-center py-5 animate-fade-in">
        <div class="spinner-box mx-auto mb-3">
          <div class="spinner-inner"></div>
        </div>
        <p class="text-muted small uppercase tracking-widest mt-2">Accessing Secure Records...</p>
      </div>
    } @else {
      @if (errorMessage()) {
        <div class="alert-glass p-3 rounded-3 border border-danger border-opacity-20 bg-danger bg-opacity-10 d-flex align-items-center gap-3 mb-4">
          <i class="bi bi-exclamation-triangle text-danger fs-5"></i>
          <span class="text-danger small fw-bold">{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #editProjectForm="ngForm" class="animate-slide-up">
        <div class="row g-4">
          <!-- Project Title -->
          <div class="col-12">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Project Title</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-fonts me-3 text-muted opacity-50"></i>
                <input 
                  type="text" 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0" 
                  [(ngModel)]="projectData.title" 
                  name="title"
                  required
                  maxlength="255"
                  placeholder="Recording Session Title"
                >
              </div>
            </div>
          </div>

          <!-- Artist Name -->
          <div class="col-md-7">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Principal Artist</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-person-badge me-3 text-muted opacity-50"></i>
                <input 
                  type="text" 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0" 
                  [(ngModel)]="projectData.artistName" 
                  name="artistName"
                  required
                  maxlength="255"
                  placeholder="Lead Vocalist / Band"
                >
              </div>
            </div>
          </div>

          <!-- Status -->
          <div class="col-md-5">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Current Status</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-activity me-3 text-muted opacity-50"></i>
                <select class="form-select bg-transparent border-0 text-white shadow-none p-0 custom-select-arrow" [(ngModel)]="projectData.status" name="status">
                  @for (opt of statusOptions; track opt.value) {
                    <option [value]="opt.value" class="bg-dark">{{ opt.label }}</option>
                  }
                </select>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="col-12">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Production Notes</label>
              <div class="input-glass-container d-flex align-items-start px-3 py-3 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-card-text me-3 text-muted opacity-50 mt-1"></i>
                <textarea 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0" 
                  [(ngModel)]="projectData.description" 
                  name="description"
                  maxlength="1000"
                  rows="3"
                  placeholder="Additional mixing details or recording requirements..."
                ></textarea>
              </div>
            </div>
          </div>

          <!-- Dates -->
          <div class="col-md-6">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Submission Deadline</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-calendar-event me-3 text-muted opacity-50"></i>
                <input type="date" class="form-control bg-transparent border-0 text-white shadow-none p-0" [ngModel]="projectData.deadline | date:'yyyy-MM-dd'" (ngModelChange)="projectData.deadline = $event" name="deadline">
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom small uppercase fw-bold spacing-1 mb-2">Target Release</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-calendar-check me-3 text-muted opacity-50"></i>
                <input type="date" class="form-control bg-transparent border-0 text-white shadow-none p-0" [ngModel]="projectData.targetReleaseDate | date:'yyyy-MM-dd'" (ngModelChange)="projectData.targetReleaseDate = $event" name="targetReleaseDate">
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-3 justify-content-end mt-5 pt-4 border-top border-white border-opacity-05">
          <button type="button" class="btn btn-icon-glass px-4 py-2 rounded-pill text-muted fw-bold small uppercase" (click)="close.emit()">
            Revert Changes
          </button>
          <button 
            type="submit" 
            class="btn btn-primary-glow-action px-5 py-2 rounded-pill d-flex align-items-center gap-2"
            [disabled]="!editProjectForm.form.valid || isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner-border spinner-border-sm"></span>
            } @else {
              <i class="bi bi-save2"></i>
              Update Records
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
