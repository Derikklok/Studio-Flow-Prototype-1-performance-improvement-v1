<div class="modal-backdrop-custom d-flex align-items-center justify-content-center px-3">
  <div class="card-custom shadow-lg w-100 modal-container" style="max-width: 550px; border-color: var(--primary-glow);">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-1">
      <h4 class="mb-0">Edit Project</h4>
      <button class="btn-close btn-close-white" (click)="close.emit()"></button>
    </div>

    @if (isFetching()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2 small">Fetching details...</p>
      </div>
    } @else {
      @if (errorMessage()) {
        <div class="alert alert-danger py-2 small mb-3">{{ errorMessage() }}</div>
      }

      <form (ngSubmit)="onSubmit()" #editProjectForm="ngForm">
        <div class="mb-3">
          <label class="form-label text-muted small">Project Title</label>
          <input 
            type="text" 
            class="form-control" 
            [(ngModel)]="projectData.title" 
            name="title"
            required
            maxlength="255"
          >
        </div>

        <div class="mb-3">
          <label class="form-label text-muted small">Artist Name</label>
          <input 
            type="text" 
            class="form-control" 
            [(ngModel)]="projectData.artistName" 
            name="artistName"
            required
            maxlength="255"
          >
        </div>

        <div class="mb-3">
          <label class="form-label text-muted small">Status</label>
          <select class="form-select" [(ngModel)]="projectData.status" name="status">
            @for (opt of statusOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label text-muted small">Description</label>
          <textarea 
            class="form-control" 
            [(ngModel)]="projectData.description" 
            name="description"
            maxlength="1000"
          ></textarea>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-6">
            <label class="form-label text-muted small">Deadline</label>
            <input type="date" class="form-control" [ngModel]="projectData.deadline | date:'yyyy-MM-dd'" (ngModelChange)="projectData.deadline = $event" name="deadline">
          </div>
          <div class="col-6">
            <label class="form-label text-muted small">Release Date</label>
            <input type="date" class="form-control" [ngModel]="projectData.targetReleaseDate | date:'yyyy-MM-dd'" (ngModelChange)="projectData.targetReleaseDate = $event" name="targetReleaseDate">
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-outline-light" (click)="close.emit()">Cancel</button>
          <button 
            type="submit" 
            class="btn btn-primary-custom px-4"
            [disabled]="!editProjectForm.form.valid || isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Save Changes
          </button>
        </div>
      </form>
    }
  </div>
</div>
