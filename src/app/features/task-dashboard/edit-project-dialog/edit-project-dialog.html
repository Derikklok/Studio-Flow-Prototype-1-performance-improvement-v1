<div class="modal-backdrop-custom d-flex align-items-center justify-content-center px-3 animate-fade-in shadow-app">
  <div class="modal-container-premium w-100 p-4 p-md-4 position-relative overflow-hidden" 
       style="max-width: 520px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 17, 26, 0.98); backdrop-filter: blur(30px); border-radius: 24px;">
    
    <div class="card-glow-top"></div>

    <div class="d-flex justify-content-between align-items-center mb-4 position-relative">
      <div class="d-flex align-items-center gap-3">
        <div class="p-2 rounded-3 bg-glass border border-white border-opacity-10 shadow-sm">
          <i class="bi bi-pencil-square text-primary-custom fs-4"></i>
        </div>
        <div>
          <h4 class="mb-0 text-white fw-bold tracking-tight">Modify Project</h4>
          <p class="text-muted x-small mb-0 uppercase tracking-widest spacing-1 opacity-75">Control Center Update</p>
        </div>
      </div>
      <button class="btn-icon-glass-circle border-0 text-muted hover-white transition-all shadow-sm" (click)="close.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    @if (isFetching()) {
      <div class="text-center py-4 animate-fade-in">
        <div class="spinner-box mx-auto mb-3" style="width: 32px; height: 32px;">
          <div class="spinner-inner"></div>
        </div>
        <p class="text-muted x-small uppercase tracking-widest mt-2">Accessing Secure Records...</p>
      </div>
    } @else {
      @if (errorMessage()) {
        <div class="alert-glass p-2 px-3 rounded-3 border border-danger border-opacity-20 bg-danger bg-opacity-10 d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-exclamation-triangle text-danger fs-6"></i>
          <span class="text-danger x-small fw-bold">{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #editProjectForm="ngForm" class="animate-slide-up">
        <div class="row g-3">
          <!-- Project Title -->
          <div class="col-12 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Project Title</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-1.5 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-fonts me-2 text-muted opacity-50 smaller"></i>
                <input 
                  type="text" 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0 small" 
                  [(ngModel)]="projectData.title" 
                  name="title"
                  required
                  maxlength="255"
                  placeholder="Recording Session Title"
                >
              </div>
            </div>
          </div>

          <!-- Artist Name -->
          <div class="col-md-7 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Principal Artist</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-1.5 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-person-badge me-2 text-muted opacity-50 smaller"></i>
                <input 
                  type="text" 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0 small" 
                  [(ngModel)]="projectData.artistName" 
                  name="artistName"
                  required
                  maxlength="255"
                  placeholder="Lead Vocalist / Band"
                >
              </div>
            </div>
          </div>

          <!-- Status -->
          <div class="col-md-5 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Current Status</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-1.5 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-activity me-2 text-muted opacity-50 smaller"></i>
                <select class="form-select bg-transparent border-0 text-white shadow-none p-0 custom-select-arrow small" [(ngModel)]="projectData.status" name="status">
                  @for (opt of statusOptions; track opt.value) {
                    <option [value]="opt.value" class="bg-dark">{{ opt.label }}</option>
                  }
                </select>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="col-12 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Production Notes</label>
              <div class="input-glass-container d-flex align-items-start px-3 py-2 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-card-text me-2 text-muted opacity-50 smaller mt-1"></i>
                <textarea 
                  class="form-control bg-transparent border-0 text-white shadow-none p-0 small" 
                  [(ngModel)]="projectData.description" 
                  name="description"
                  maxlength="1000"
                  rows="2"
                  placeholder="Additional mixing details..."
                ></textarea>
              </div>
            </div>
          </div>

          <!-- Dates -->
          <div class="col-md-6 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Submission Deadline</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-1.5 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-calendar-event me-2 text-muted opacity-50 smaller"></i>
                <input type="date" class="form-control bg-transparent border-0 text-white shadow-none p-0 small" [ngModel]="projectData.deadline | date:'yyyy-MM-dd'" (ngModelChange)="projectData.deadline = $event" name="deadline">
              </div>
            </div>
          </div>

          <div class="col-md-6 py-1">
            <div class="form-group-premium">
              <label class="form-label text-muted-custom x-small uppercase fw-bold spacing-1 mb-1">Target Release</label>
              <div class="input-glass-container d-flex align-items-center px-3 py-1.5 rounded-3 bg-glass-dark border border-white border-opacity-10 focus-within-primary transition-all">
                <i class="bi bi-calendar-check me-2 text-muted opacity-50 smaller"></i>
                <input type="date" class="form-control bg-transparent border-0 text-white shadow-none p-0 small" [ngModel]="projectData.targetReleaseDate | date:'yyyy-MM-dd'" (ngModelChange)="projectData.targetReleaseDate = $event" name="targetReleaseDate">
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-3 justify-content-end mt-4 pt-3 border-top border-white border-opacity-05">
          <button type="button" class="btn btn-icon-glass px-3 py-1.5 rounded-pill text-muted fw-bold x-small uppercase" (click)="close.emit()">
            Revert
          </button>
          <button 
            type="submit" 
            class="btn btn-primary-glow-action px-4 py-1.5 rounded-pill d-flex align-items-center gap-2"
            [disabled]="!editProjectForm.form.valid || isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner-border spinner-border-sm"></span>
            } @else {
              <i class="bi bi-save2 smaller"></i>
              <span class="small uppercase fw-bold">Update Records</span>
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
