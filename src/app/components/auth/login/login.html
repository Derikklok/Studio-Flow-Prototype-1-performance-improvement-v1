<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card-custom">
        <h2 class="text-center mb-4">Login</h2>
        
        @if (errorMessage()) {
          <div class="alert alert-danger mb-3 py-2">
            {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="mb-3">
            <label for="email" class="form-label text-muted small">Email Address</label>
            <input 
              type="email" 
              class="form-control bg-dark text-light border-secondary" 
              id="email" 
              name="email"
              [(ngModel)]="credentials.email"
              required
              email
              #email="ngModel"
            >
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label text-muted small">Password</label>
            <input 
              type="password" 
              class="form-control bg-dark text-light border-secondary" 
              id="password" 
              name="password"
              [(ngModel)]="credentials.password"
              required
              #password="ngModel"
            >
          </div>

          <button 
            type="submit" 
            class="btn btn-primary-custom w-100 mb-3"
            [disabled]="!loginForm.form.valid || isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Login
          </button>
        </form>

        <div class="text-center small">
          <span class="text-muted">Don't have an account? </span>
          <a routerLink="/register" class="text-primary text-decoration-none">Register</a>
        </div>
      </div>
      
      <div class="text-center mt-3">
        <a routerLink="/" class="text-muted small text-decoration-none">&larr; Back to Home</a>
      </div>
    </div>
  </div>
</div>
