<div class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-overlay"></div>
  
  <div class="container position-relative z-1">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-8">
        <div class="auth-card p-5 rounded-4 shadow-lg border border-white border-opacity-10">
          <div class="text-center mb-5">
            <div class="auth-brand mb-3">
              <i class="bi bi-vinyl-fill spin-slow text-primary-custom"></i>
            </div>
            <h2 class="fw-bold text-white mb-1">Welcome Back</h2>
            <p class="text-muted small uppercase spacing-2">Authorized Access Only</p>
          </div>
          
          @if (errorMessage()) {
            <div class="alert alert-danger-custom mb-4 animate-shake">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              {{ errorMessage() }}
            </div>
          }

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group mb-4">
              <label class="form-label-custom">Work Email</label>
              <div class="input-icon-group">
                <i class="bi bi-envelope-at"></i>
                <input 
                  type="email" 
                  class="form-control-custom" 
                  name="email" 
                  [(ngModel)]="credentials.email" 
                  required 
                  email
                  placeholder="name@soundwave.pro"
                >
              </div>
            </div>
            
            <div class="form-group mb-4">
              <label class="form-label-custom">Security Key</label>
              <div class="input-icon-group">
                <i class="bi bi-shield-lock"></i>
                <input 
                  type="password" 
                  class="form-control-custom" 
                  name="password" 
                  [(ngModel)]="credentials.password" 
                  required
                  placeholder="••••••••"
                >
              </div>
            </div>

            <button 
              type="submit" 
              class="btn-auth-primary w-100 py-3 rounded-pill mb-4 d-flex align-items-center justify-content-center gap-2"
              [disabled]="!loginForm.form.valid || isLoading()"
            >
              @if (isLoading()) {
                <span class="spinner-border spinner-border-sm"></span>
                Authenticating...
              } @else {
                <i class="bi bi-key-fill"></i> Access Secure Studio
              }
            </button>
          </form>

          <div class="text-center">
            <p class="text-muted small mb-0">
              New Producer? <a routerLink="/register" class="text-primary-custom text-decoration-none fw-bold hover-glow">Request Account</a>
            </p>
          </div>
        </div>
        
        <div class="text-center mt-4">
          <a routerLink="/" class="text-muted-hover small text-decoration-none d-inline-flex align-items-center gap-2">
            <i class="bi bi-arrow-left"></i> Systems Overview
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
